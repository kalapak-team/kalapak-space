services:
  postgres:
    image: postgres:16-alpine
    container_name: kalapak_postgres
    environment:
      POSTGRES_DB: kalapak_db
      POSTGRES_USER: kalapak_user
      POSTGRES_PASSWORD: kalapak_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - kalapak_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalapak_user -d kalapak_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kalapak_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kalapak.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kalapak_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kalapak_redis
    ports:
      - "6379:6379"
    networks:
      - kalapak_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kalapak_backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kalapak_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: kalapak_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - kalapak_network
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:

networks:
  kalapak_network:
    driver: bridge
