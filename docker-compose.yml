services:
  postgres:
    image: postgres:16-alpine
    container_name: kalapak_postgres
    environment:
      POSTGRES_DB: kalapak_db
      POSTGRES_USER: kalapak_user
      POSTGRES_PASSWORD: kalapak_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - kalapak_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalapak_user -d kalapak_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kalapak_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kalapak.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kalapak_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kalapak_redis
    ports:
      - "6379:6379"
    networks:
      - kalapak_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kalapak_backend
    entrypoint: ["sh", "/var/www/html/docker-entrypoint.sh"]
    environment:
      APP_ENV: local
      RUN_DB_SEED: "0"
      RUN_MIGRATIONS: "0"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: kalapak_db
      DB_USERNAME: kalapak_user
      DB_PASSWORD: kalapak_secret
      DB_SSLMODE: prefer
      CACHE_DRIVER: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/routes/api.php:/var/www/html/routes/api.php
      - ./backend/app/Services/SupabaseStorage.php:/var/www/html/app/Services/SupabaseStorage.php
      - ./backend/app/Http/Controllers/PublicApi/DocController.php:/var/www/html/app/Http/Controllers/PublicApi/DocController.php
      - ./backend/app/Models/Doc.php:/var/www/html/app/Models/Doc.php
      - ./backend/app/Models/DocMenu.php:/var/www/html/app/Models/DocMenu.php
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kalapak_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: kalapak_frontend
    environment:
      NUXT_DEV_API_PROXY: http://backend:8000
    ports:
      - "3000:3000"
    command:
      - sh
      - -c
      - |
        if [ ! -x node_modules/.bin/cross-env ]; then
          npm install;
        fi
        npm run dev -- --host 0.0.0.0 --port 3000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - kalapak_network
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:
  frontend_node_modules:

networks:
  kalapak_network:
    driver: bridge
