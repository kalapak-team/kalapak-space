worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # Allow large request bodies (blog posts with images, file uploads)
    client_max_body_size 20m;

    # Detect social media crawlers for dynamic OG meta tags
    map $http_user_agent $is_social_bot {
        default                     0;
        ~*facebookexternalhit       1;
        ~*Facebot                   1;
        ~*Twitterbot                1;
        ~*TelegramBot               1;
        ~*LinkedInBot               1;
        ~*WhatsApp                  1;
        ~*Slackbot                  1;
        ~*Discordbot                1;
        ~*Pinterest                 1;
        ~*Viber                     1;
        ~*Embedly                   1;
        ~*vkShare                   1;
        ~*Applebot                  1;
    }

    server {
        listen PORT_PLACEHOLDER;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # DNS resolver for runtime upstream resolution (Google DNS + Cloudflare)
        resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;
        resolver_timeout 10s;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # SPA fallback — serve index.html for all non-file routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # OG Meta: Proxy social media crawlers to backend for dynamic meta tags
        # Non-bots → rewrite to /index.html and re-match location / (SPA)
        # Bots → fall through to proxy_pass (dynamic OG tags)
        location ~ ^/blog/(.+)$ {
            set $blog_slug $1;
            set $backend BACKEND_URL_PLACEHOLDER;

            if ($is_social_bot = 0) {
                rewrite ^ /index.html last;
            }

            proxy_pass $backend/og/blog/$blog_slug;
            proxy_http_version 1.1;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
        }

        # SEO: Proxy sitemap.xml and robots.txt to backend
        location = /sitemap.xml {
            set $backend BACKEND_URL_PLACEHOLDER;
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
        }

        location = /robots.txt {
            set $backend BACKEND_URL_PLACEHOLDER;
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
        }

        # Proxy API requests to backend
        location /api/ {
            set $backend BACKEND_URL_PLACEHOLDER;
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_ssl_server_name on;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Proxy storage/media requests to backend
        location /storage/ {
            set $backend BACKEND_URL_PLACEHOLDER;
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
        }

        # Cache static assets (js, css, images, fonts)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Deny hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
